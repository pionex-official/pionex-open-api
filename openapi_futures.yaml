components:
  securitySchemes:
    apiKey:
      type: apiKey
      in: header
      name: PIONEX-KEY
      description: |
        API Key authentication. Requires two headers:
        - `PIONEX-KEY`: Your API Key
        - `PIONEX-SIGNATURE`: HMAC SHA256 hex signature

        And a `timestamp` query parameter (milliseconds).

  parameters:
    Timestamp:
      name: timestamp
      in: query
      required: true
      description: Current timestamp in milliseconds (valid range +/- 20 seconds)
      schema:
        type: integer
        format: int64

  responses:
    BadRequest:
      description: Bad request
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Unauthorized:
      description: Authentication failed
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'

  schemas:
    BaseResponse:
      type: object
      properties:
        result:
          type: boolean
          description: Request success indicator
        timestamp:
          type: integer
          format: int64
          description: Response timestamp in milliseconds

    ErrorResponse:
      type: object
      properties:
        result:
          type: boolean
          example: false
        code:
          type: string
          description: Error code
        message:
          type: string
          description: Human-readable error message
        timestamp:
          type: integer
          format: int64

    FuturesSymbolInfo:
      type: object
      properties:
        symbol:
          type: string
          description: Futures symbol identifier (displaySymbol)
          example: BTC_USDT_PERP
        name:
          type: string
          description: Futures symbol display name
        contractType:
          type: string
          description: Contract type
          enum: [PERPETUAL]
        baseCurrency:
          type: string
          description: Base asset
          example: BTC
        quoteCurrency:
          type: string
          description: Quote asset
          example: USDT
        basePrecision:
          type: integer
          description: Base asset decimal places
        quotePrecision:
          type: integer
          description: Quote asset decimal places
        minNotional:
          type: string
          description: Minimum notional value
        baseStep:
          type: string
          description: Quantity step size (base asset)
        quoteStep:
          type: string
          description: Price step size (quote asset)
        minSizeLimit:
          type: string
          description: Minimum quantity for limit orders
        maxSizeLimit:
          type: string
          description: Maximum quantity for limit orders
        maxImpactLimit:
          type: string
          description: Maximum impact price ratio for limit orders
        minSizeMarket:
          type: string
          description: Minimum quantity for market orders
        maxSizeMarket:
          type: string
          description: Maximum quantity for market orders
        maxImpactMarket:
          type: string
          description: Maximum impact price ratio for market orders
        maxOrderNum:
          type: integer
          description: Maximum number of orders per user
        status:
          type: string
          description: Symbol trading status
          enum: [TRADING, OFFLINE]
        liquidationFeeRate:
          type: string
          description: Liquidation fee rate

    RiskTableEntry:
      type: object
      properties:
        symbol:
          type: string
          description: Futures symbol (displaySymbol)
          example: BTC_USDT_PERP
        rows:
          type: array
          description: Risk tier rows
          items:
            type: object
            properties:
              rowNum:
                type: integer
                description: Tier level number
              notionalLimit:
                type: string
                description: Maximum notional value for this tier
              maxLeverage:
                type: string
                description: Maximum leverage for this tier
              maintMarginRatio:
                type: string
                description: Maintenance margin ratio
              quickDeduction:
                type: string
                description: Quick deduction amount

    AccountBalance:
      type: object
      properties:
        coin:
          type: string
          description: Currency
          example: USDT
        free:
          type: string
          description: Available balance (8 decimal places)
        frozen:
          type: string
          description: Frozen balance (8 decimal places)
        debts:
          type: string
          description: Debt amount

    IsolatedBalance:
      type: object
      properties:
        symbol:
          type: string
          description: Futures symbol
          example: BTC_USDT_PERP
        isolatedMode:
          type: string
          description: "Isolated margin type"
          enum: [ISOLATED_BOTH, ISOLATED_LONG, ISOLATED_SHORT]
        balances:
          type: array
          description: Isolated margin balances
          items:
            type: object
            properties:
              coin:
                type: string
                description: Currency
              free:
                type: string
                description: Available balance
              frozen:
                type: string
                description: Frozen balance
              debts:
                type: string
                description: Debt amount

    Position:
      type: object
      properties:
        positionId:
          type: string
          description: Position ID
        symbol:
          type: string
          description: Futures symbol (displaySymbol)
          example: BTC_USDT_PERP
        isolatedMode:
          type: string
          description: "Margin mode"
          enum: [CROSS, ISOLATED_BOTH, ISOLATED_LONG, ISOLATED_SHORT]
        riskState:
          type: string
          description: Risk state for isolated positions
        positionSide:
          type: string
          description: Position direction
          enum: [LONG, SHORT]
        netSize:
          type: string
          description: "Net position size = sizeLong + sizeShort"
        avgPrice:
          type: string
          description: "Average entry price = abs((amountLong + amountShort + amountSettled) / (sizeLong + sizeShort))"
        unrealizedPnL:
          type: string
          description: "Unrealized PnL = (markPrice - avgPrice) * netSize"
        sizeLong:
          type: string
          description: Cumulative long size (positive)
        sizeShort:
          type: string
          description: Cumulative short size (negative)
        amountLong:
          type: string
          description: Cumulative long cost (negative)
        amountShort:
          type: string
          description: Cumulative short proceeds (positive)
        amountSettled:
          type: string
          description: Cumulative settled amount
        markPrice:
          type: string
          description: Mark price
        initialMargin:
          type: string
          description: Initial margin requirement
        maintMargin:
          type: string
          description: Maintenance margin requirement
        liquidationPrice:
          type: string
          description: Estimated liquidation price
        leverage:
          type: string
          description: Leverage multiplier
        sizeLiquidated:
          type: string
          description: "Cumulative liquidated size (negative for long, positive for short)"
        amountLiquidated:
          type: string
          description: "Cumulative liquidated amount (positive for long, negative for short)"
        createTime:
          type: integer
          format: int64
          description: Creation time in milliseconds
        updateTime:
          type: integer
          format: int64
          description: Last update time in milliseconds

    HistoryPosition:
      type: object
      properties:
        positionId:
          type: string
          description: Position ID
        symbol:
          type: string
          description: Futures symbol
          example: BTC_USDT_PERP
        isolatedMode:
          type: string
          description: "Margin mode"
          enum: [CROSS, ISOLATED_BOTH, ISOLATED_LONG, ISOLATED_SHORT]
        positionSide:
          type: string
          description: Position direction
          enum: [LONG, SHORT]
        sizeLong:
          type: string
          description: Cumulative long size
        sizeShort:
          type: string
          description: Cumulative short size
        amountLong:
          type: string
          description: Cumulative long cost
        amountShort:
          type: string
          description: Cumulative short proceeds
        amountSettled:
          type: string
          description: Cumulative settled amount
        leverage:
          type: string
          description: Leverage multiplier
        sizeLiquidated:
          type: string
          description: "Cumulative liquidated size (negative for long, positive for short)"
        amountLiquidated:
          type: string
          description: "Cumulative liquidated amount (positive for long, negative for short)"
        sizeTakeover:
          type: string
          description: Taken-over size
        createTime:
          type: integer
          format: int64
          description: Creation time in milliseconds
        updateTime:
          type: integer
          format: int64
          description: Last update time in milliseconds

    AccountDetail:
      type: object
      properties:
        quoteRisks:
          type: array
          description: Risk data partitioned by quote currency
          items:
            type: object
            properties:
              quote:
                type: string
                description: Quote currency
              riskState:
                type: string
                description: Risk state of the partition
        balances:
          type: array
          description: Cross margin balance list (excluding zero balances)
          items:
            $ref: '#/components/schemas/AccountDetailBalance'
        positions:
          type: array
          description: Position list
          items:
            $ref: '#/components/schemas/AccountDetailPosition'

    AccountDetailBalance:
      type: object
      properties:
        coin:
          type: string
          description: Currency
        assets:
          type: string
          description: "Total assets = free + frozen"
        free:
          type: string
          description: Available balance
        frozen:
          type: string
          description: Frozen balance
        transferable:
          type: string
          description: Funds available for spot trading
        available:
          type: string
          description: Available margin
        unrealizedPnL:
          type: string
          description: Total unrealized PnL
        totalInitialMargin:
          type: string
          description: Total initial margin
        debts:
          type: string
          description: Total debt

    AccountDetailPosition:
      type: object
      properties:
        symbol:
          type: string
          description: Futures symbol
        positionId:
          type: string
          description: Position unique identifier
        isolatedMode:
          type: string
          description: "Margin mode"
          enum: [CROSS, ISOLATED_BOTH, ISOLATED_LONG, ISOLATED_SHORT]
        positionSide:
          type: string
          description: Position direction
          enum: [LONG, SHORT]
        netSize:
          type: string
          description: "Net position size = sizeLong + sizeShort + sizeLiquidated"
        avgPrice:
          type: string
          description: "Average entry price"
        unrealizedPnL:
          type: string
          description: "Unrealized PnL = (markPrice - avgPrice) * netSize"
        sizeLong:
          type: string
          description: Cumulative long size (positive)
        sizeShort:
          type: string
          description: Cumulative short size (negative)
        amountLong:
          type: string
          description: Cumulative long cost (negative)
        amountShort:
          type: string
          description: Cumulative short proceeds (positive)
        amountSettled:
          type: string
          description: Cumulative settled amount
        markPrice:
          type: string
          description: Mark price
        initialMargin:
          type: string
          description: "Initial margin (for hedge mode, this covers both long, short, and pending order margin)"
        maintMargin:
          type: string
          description: Maintenance margin
        liquidationPrice:
          type: string
          description: Estimated liquidation price
        leverage:
          type: string
          description: Leverage multiplier
        sizeLiquidated:
          type: string
          description: "Cumulative liquidated size (negative for long, positive for short)"
        amountLiquidated:
          type: string
          description: "Cumulative liquidated amount (positive for long, negative for short)"
        createdTime:
          type: integer
          format: int64
          description: Creation time in milliseconds
        updatedTime:
          type: integer
          format: int64
          description: Last update time in milliseconds
        riskState:
          type: string
          description: Risk state for isolated positions
        balances:
          type: array
          description: Isolated margin balances
          items:
            type: object
            properties:
              totalInitialMargin:
                type: string
                description: Isolated initial margin
              transferable:
                type: string
                description: Funds available for trading or transfer
              coin:
                type: string
                description: Currency
              free:
                type: string
                description: Available balance
              frozen:
                type: string
                description: Frozen balance
              debts:
                type: string
                description: Debt amount

    Order:
      type: object
      properties:
        orderId:
          type: integer
          format: int64
          description: Order ID
        symbol:
          type: string
          description: Futures symbol
          example: BTC_USDT_PERP
        type:
          type: string
          description: Order type
          enum: [LIMIT, MARKET_QTY, IOC, FOK, POSTONLY]
        positionMode:
          type: string
          description: Position mode
          enum: [BUYSELL, OPENCLOSE]
        isolatedMode:
          type: string
          description: Margin mode
          enum: [CROSS, ISOLATED_BOTH, ISOLATED_LONG, ISOLATED_SHORT]
        side:
          type: string
          description: Order side
          enum: [BUY, SELL]
        positionSide:
          type: string
          description: Position side
          enum: [BOTH, LONG, SHORT]
        price:
          type: string
          description: Order price
        origSize:
          type: string
          description: Original order quantity as submitted by user
        size:
          type: string
          description: "Actual order quantity (may be trimmed for reduce-only orders)"
        amount:
          type: string
          description: Market buy order amount
        filledSize:
          type: string
          description: Filled quantity
        filledAmount:
          type: string
          description: Filled amount
        status:
          type: string
          description: "Order status. OPEN includes SUBMITTED/CONFIRMED/PARTIAL_FILLED. CLOSED includes FILLED/CANCELED/REJECTED."
          enum: [OPEN, CLOSED]
        reduceOnly:
          type: boolean
          description: "Whether this is a reduce-only order. Only applicable in one-way mode (BUYSELL)."
        clientOrderId:
          type: string
          description: Client order ID
        source:
          type: string
          description: Order source
          enum: [MANUAL, API, SYSTEM, TRIGGER]
        createTime:
          type: integer
          format: int64
          description: Creation time in milliseconds
        updateTime:
          type: integer
          format: int64
          description: Last update time in milliseconds

    Fill:
      type: object
      properties:
        id:
          type: integer
          format: int64
          description: Fill ID
        orderId:
          type: integer
          format: int64
          description: Order ID
        symbol:
          type: string
          description: Futures symbol
          example: BTC_USDT_PERP
        side:
          type: string
          description: Order side
          enum: [BUY, SELL]
        role:
          type: string
          description: Fill role
          enum: [TAKER, MAKER]
        price:
          type: string
          description: Fill price
        size:
          type: string
          description: Fill quantity
        fee:
          type: string
          description: Fee amount
        feeCoin:
          type: string
          description: Fee currency
        feeType:
          type: string
          description: "Fee type. TRADING: trading fee, LIQUIDATION: liquidation fee."
          enum: [TRADING, LIQUIDATION]
        timestamp:
          type: integer
          format: int64
          description: Fill time in milliseconds

    FundingFeeRecord:
      type: object
      properties:
        symbol:
          type: string
          description: Futures symbol
          example: BTC_USDT_PERP
        isolatedMode:
          type: string
          description: "Margin mode. CROSS for cross margin, ISOLATED for all isolated types."
          enum: [CROSS, ISOLATED]
        fundingFee:
          type: string
          description: Funding fee amount
        fundingCoin:
          type: string
          description: Funding fee currency
        timestamp:
          type: integer
          format: int64
          description: Funding fee time in milliseconds
        fundingRate:
          type: string
          description: Funding rate used for calculation

    MarketTrade:
      type: object
      properties:
        symbol:
          type: string
          description: Futures symbol
          example: BTC_USDT_PERP
        tradeId:
          type: string
          description: Trade ID
        price:
          type: string
          description: Trade price
        size:
          type: string
          description: Trade quantity
        side:
          type: string
          description: Taker side
          enum: [BUY, SELL]
        timestamp:
          type: string
          description: Trade time in milliseconds

    Kline:
      type: object
      properties:
        time:
          type: integer
          format: int64
          description: Kline open time in milliseconds
        open:
          type: string
          description: Open price
        close:
          type: string
          description: Close price
        high:
          type: string
          description: Highest price
        low:
          type: string
          description: Lowest price
        volume:
          type: string
          description: Trading volume in base currency

    Ticker:
      type: object
      properties:
        symbol:
          type: string
          description: Futures symbol
          example: BTC_USDT_PERP
        time:
          type: integer
          format: int64
          description: Server time in milliseconds (rounded up to the second)
        open:
          type: string
          description: Open price
        close:
          type: string
          description: Close price
        high:
          type: string
          description: Highest price
        low:
          type: string
          description: Lowest price
        volume:
          type: string
          description: Trading volume in base currency
        amount:
          type: string
          description: "Trading amount (sum of price * quantity)"
        count:
          type: integer
          description: Number of trades

    BookTicker:
      type: object
      properties:
        symbol:
          type: string
          description: Futures symbol
          example: BTC_USDT_PERP
        bidPrice:
          type: string
          description: Best bid price
        bidSize:
          type: string
          description: Best bid quantity
        askPrice:
          type: string
          description: Best ask price
        askSize:
          type: string
          description: Best ask quantity
        timestamp:
          type: integer
          format: int64
          description: Update time in milliseconds

    IndexKline:
      type: object
      properties:
        time:
          type: string
          description: Kline open time in milliseconds
        open:
          type: string
          description: Open price
        close:
          type: string
          description: Close price
        high:
          type: string
          description: Highest price
        low:
          type: string
          description: Lowest price

    FuturesIndex:
      type: object
      properties:
        symbol:
          type: string
          description: Futures symbol
          example: BTC_USDT_PERP
        indexPrice:
          type: string
          description: Index price
        markPrice:
          type: string
          description: Mark price
        nextFundingRate:
          type: string
          description: Estimated next funding rate
        nextFundingTime:
          type: integer
          format: int64
          description: Next funding time in milliseconds
        updateTime:
          type: integer
          format: int64
          description: Last update time in milliseconds

    TransferRecord:
      type: object
      properties:
        transferId:
          type: string
          description: Transfer ID
        fromAccount:
          type: string
          description: Source account
          enum: [MAIN, TRADE]
        toAccount:
          type: string
          description: Destination account
          enum: [MAIN, TRADE]
        currency:
          type: string
          description: Currency
        amount:
          type: string
          description: Transfer amount
        clientId:
          type: string
          description: Client request ID
        status:
          type: string
          description: Transfer status
          enum: [COMPLETED, PROCESSING, FAILED]
        reason:
          type: string
          description: Transfer reason
          enum: [USER_MANUAL, OPENAPI]
        comment:
          type: string
          description: "Remark, limited to 32 characters"
        timestamp:
          type: integer
          format: int64
          description: Operation time in milliseconds
