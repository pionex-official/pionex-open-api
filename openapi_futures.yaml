openapi: 3.0.3
info:
  title: Pionex Futures Open API
  description: |
    Pionex cryptocurrency futures exchange RESTful API.

    # General Info

    ## Basic Info

    > **Note:** The Partner API is currently **Invite Only**.

    **Base URL:** `https://api.pionex.com`

    **Request Format:**
    - For private requests, the `timestamp` parameter (in milliseconds) must be included in the query string. The timestamp is valid within a range of ±20 seconds.
    - Private requests require `PIONEX-KEY` (API Key) and `PIONEX-SIGNATURE` headers.
    - GET requests: additional parameters are passed in the query string.
    - POST/DELETE requests: parameters are passed in the request body as JSON (`application/json`).
    - Zero-valued number parameters are disregarded.

    **Signature Construction:**
    - GET: `METHOD + PATH_URL + QUERY + TIMESTAMP`
    - POST/DELETE: `METHOD + PATH_URL + QUERY + TIMESTAMP + body`

    **Response Format:**

    All responses are JSON objects containing:
    - `result` (boolean): success indicator
    - `timestamp` (number): response timestamp in milliseconds
    - On success: `data` object with business information
    - On failure: `code` (string) and `message` (string) with error details

    Success example:
    ```json
    {"result": true, "data": {"orderId": 123456789}, "timestamp": 1566691672311}
    ```

    Failure example:
    ```json
    {"result": false, "code": "TRADE_INVALID_SYMBOL", "message": "Invalid symbol", "timestamp": 1566691672311}
    ```

    ## Rate Limits

    - Each endpoint has a weight value that determines how many requests it counts toward the limit.
    - IP-based and account-based limits operate independently.
    - All endpoints share the 10 per second limit based on IP.
    - Private endpoints share the 10 per second limit based on ACCOUNT.
    - Exceeding the weight limit results in HTTP 429 status code.
    - The violating IP or account receives a 60-second ban.
    - Repeated violations extend the ban duration by 10 seconds per additional request.

    ## Authentication

    [API Key Guide](https://www.pionex.com/docs/api-docs/references/api-key-guide)

    Private endpoints require HMAC SHA256 signature authentication. Public endpoints (common information, market data) do not require signing.

    API Keys must have appropriate permissions assigned before accessing corresponding endpoints.

    **Required headers:**
    - `PIONEX-KEY`: Your API Key
    - `PIONEX-SIGNATURE`: HMAC SHA256 hex signature

    **Required query parameter:**
    - `timestamp`: Current time in milliseconds (valid within ±20 seconds)

    **Signing Process:**

    1. Obtain current timestamp in milliseconds
    2. Format query parameters as key-value pairs (no URL encoding for signature values)
    3. Sort parameters alphabetically by key and join with `&` (include timestamp)
    4. Build PATH_URL by appending sorted parameters to the request path with `?`
    5. Prepend the HTTP METHOD (GET, POST, DELETE) to the PATH_URL
    6. For POST/DELETE requests, append the request body; skip for GET
    7. Generate HMAC SHA256 using your API Secret and the concatenated string, convert to hexadecimal

    The resulting hex signature goes into the request header as `PIONEX-SIGNATURE`.

    ### API Key Permissions

    Each API Key can be configured with **Enable reading**, **Enable trading**, and/or **Enable transfer** permissions. Make sure your API Key has the appropriate permission enabled before calling the following endpoints.

    **Endpoints requiring `Enable reading` permission:**
    - `GET /uapi/v1/account/balances` — Get account balances
    - `GET /uapi/v1/account/positions` — Get current positions
    - `GET /uapi/v1/account/historyPositions` — Get history positions
    - `GET /uapi/v1/account/detail` — Get account detail
    - `GET /uapi/v1/account/leverage` — Get current leverage
    - `GET /uapi/v1/account/positionMode` — Get position mode
    - `GET /uapi/v1/trade/isolatedMode` — Get margin mode
    - `GET /uapi/v1/trade/order` — Get single order
    - `GET /uapi/v1/trade/orderByClientOrderId` — Get order by client order ID
    - `GET /uapi/v1/trade/openOrders` — Get open orders
    - `GET /uapi/v1/trade/historyOrders` — Get history orders
    - `GET /uapi/v1/trade/fills` — Get fills
    - `GET /uapi/v1/trade/fillsByOrderId` — Get fills by order ID
    - `GET /uapi/v1/trade/fundingFee` — Get funding fee records
    - `GET /api/v1/assets/transfer` — Get single transfer record
    - `GET /api/v1/assets/transfers` — Get transfer records

    **Endpoints requiring `Enable trading` permission:**
    - `POST /uapi/v1/trade/order` — Place order
    - `DELETE /uapi/v1/trade/order` — Cancel order
    - `POST /uapi/v1/trade/massOrder` — Batch place orders
    - `DELETE /uapi/v1/trade/allOrders` — Cancel all orders
    - `POST /uapi/v1/trade/isolateMargin` — Transfer isolated margin
    - `POST /uapi/v1/account/leverage` — Update leverage
    - `POST /uapi/v1/account/positionMode` — Update position mode
    - `POST /uapi/v1/trade/isolatedMode` — Update margin mode

    **Endpoints requiring `Enable transfer` permission:**
    - `POST /api/v1/assets/transfer` — Create transfer
  version: 1.0.0
  contact:
    name: Pionex API Support
    url: https://t.me/pionexapi

servers:
  - url: https://api.pionex.com
    description: Production

security: []

tags:
  - name: Common
    description: Futures common information (public)
  - name: Account
    description: Futures account management (private)
  - name: Trade
    description: Futures order trading (private)
  - name: Transfer
    description: Fund transfers between accounts (private)
  - name: Market
    description: Futures market data (public)

paths:
  /api/v1/common/symbols:
    get:
      tags: [Common]
      summary: Get futures symbols info
      description: "Get all futures trading pair information. Weight: 5."
      operationId: getFuturesSymbols
      parameters:
        - name: symbols
          in: query
          description: "Comma-separated symbol list, e.g. BTC_USDT_PERP,ETH_USDT_PERP. When specified, `type` parameter is ignored."
          schema:
            type: string
            example: "BTC_USDT_PERP,ETH_USDT_PERP"
        - name: type
          in: query
          description: "Market type. Defaults to SPOT. Only effective when `symbols` is not specified."
          schema:
            type: string
            enum: [SPOT, PERP]
        - name: status
          in: query
          description: "Filter by status. Defaults to ALL. Only effective for PERP type."
          schema:
            type: string
            enum: [ALL, TRADING, OFFLINE]
            default: ALL
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/BaseResponse'
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          symbols:
                            type: array
                            items:
                              $ref: '#/components/schemas/FuturesSymbolInfo'
        '400':
          $ref: '#/components/responses/BadRequest'

  /api/v1/common/riskTable:
    get:
      tags: [Common]
      summary: Get risk table
      description: "Get risk limit tiers for futures symbols. Weight: 5."
      operationId: getRiskTable
      parameters:
        - name: symbol
          in: query
          description: Futures symbol. Returns all symbols if not specified.
          schema:
            type: string
            example: BTC_USDT_PERP
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/BaseResponse'
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          symbols:
                            type: array
                            items:
                              $ref: '#/components/schemas/RiskTableEntry'
        '400':
          $ref: '#/components/responses/BadRequest'

  /uapi/v1/account/balances:
    get:
      tags: [Account]
      summary: Get account balances
      description: "Query futures account asset balances. Weight: 5."
      operationId: getAccountBalances
      security:
        - apiKey: []
      parameters:
        - $ref: '#/components/parameters/Timestamp'
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/BaseResponse'
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          balances:
                            type: array
                            description: Cross margin balance list
                            items:
                              $ref: '#/components/schemas/AccountBalance'
                          isolates:
                            type: array
                            description: Isolated margin asset list
                            items:
                              $ref: '#/components/schemas/IsolatedBalance'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /uapi/v1/account/positions:
    get:
      tags: [Account]
      summary: Get current positions
      description: "Query current active positions. Weight: 5."
      operationId: getPositions
      security:
        - apiKey: []
      parameters:
        - $ref: '#/components/parameters/Timestamp'
        - name: symbol
          in: query
          description: "Futures symbol. Returns all positions if not specified."
          schema:
            type: string
            example: BTC_USDT_PERP
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/BaseResponse'
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          positions:
                            type: array
                            items:
                              $ref: '#/components/schemas/Position'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /uapi/v1/account/historyPositions:
    get:
      tags: [Account]
      summary: Get history positions
      description: "Query historical closed or taken-over positions. Weight: 5."
      operationId: getHistoryPositions
      security:
        - apiKey: []
      parameters:
        - $ref: '#/components/parameters/Timestamp'
        - name: symbol
          in: query
          description: Futures symbol
          schema:
            type: string
        - name: positionFlag
          in: query
          description: "Position flag filter"
          schema:
            type: string
            enum: [CLOSED, TAKEOVER]
        - name: startTime
          in: query
          description: Start time filter based on updateTime (milliseconds)
          schema:
            type: integer
            format: int64
        - name: endTime
          in: query
          description: End time filter based on updateTime (milliseconds)
          schema:
            type: integer
            format: int64
        - name: limit
          in: query
          description: Number of results to return
          schema:
            type: integer
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/BaseResponse'
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          positions:
                            type: array
                            description: Positions sorted by close time in descending order
                            items:
                              $ref: '#/components/schemas/HistoryPosition'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /uapi/v1/account/detail:
    get:
      tags: [Account]
      summary: Get account detail
      description: "Query account detail including balances, positions, and risk info. Weight: 5."
      operationId: getAccountDetail
      security:
        - apiKey: []
      parameters:
        - $ref: '#/components/parameters/Timestamp'
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/BaseResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/AccountDetail'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /uapi/v1/trade/isolateMargin:
    post:
      tags: [Account]
      summary: Transfer isolated margin
      description: "Transfer funds in or out of isolated margin for a specific symbol. Weight: 5."
      operationId: transferIsolateMargin
      security:
        - apiKey: []
      parameters:
        - $ref: '#/components/parameters/Timestamp'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [clientId, symbol, direction, isolatedMode, coin, amount]
              properties:
                clientId:
                  type: string
                  description: "Unique client ID per request, used for deduplication. Valid for 8 hours."
                symbol:
                  type: string
                  description: Futures symbol
                  example: BTC_USDT_PERP
                direction:
                  type: string
                  description: "Transfer direction"
                  enum: [IN, OUT]
                isolatedMode:
                  type: string
                  description: "Isolated margin mode"
                  enum: [ISOLATED_BOTH, ISOLATED_LONG, ISOLATED_SHORT]
                coin:
                  type: string
                  description: "Currency to transfer (USDT or BTC)"
                  enum: [USDT, BTC]
                amount:
                  type: string
                  description: Transfer amount
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BaseResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /uapi/v1/account/leverage:
    get:
      tags: [Account]
      summary: Get current leverage
      description: "Query current leverage for a specific symbol. Weight: 5."
      operationId: getLeverage
      security:
        - apiKey: []
      parameters:
        - $ref: '#/components/parameters/Timestamp'
        - name: symbol
          in: query
          required: true
          description: Futures symbol
          schema:
            type: string
            example: BTC_USDT_PERP
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/BaseResponse'
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          symbol:
                            type: string
                            description: Futures symbol
                          leverage:
                            type: string
                            description: Current leverage multiplier
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
    post:
      tags: [Account]
      summary: Update leverage
      description: "Modify leverage for a specific symbol. Weight: 5."
      operationId: updateLeverage
      security:
        - apiKey: []
      parameters:
        - $ref: '#/components/parameters/Timestamp'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [symbol, leverage]
              properties:
                symbol:
                  type: string
                  description: Futures symbol
                  example: BTC_USDT_PERP
                leverage:
                  type: string
                  description: Leverage multiplier
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/BaseResponse'
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          symbol:
                            type: string
                            description: Futures symbol
                          leverage:
                            type: string
                            description: Updated leverage multiplier
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /uapi/v1/account/positionMode:
    get:
      tags: [Account]
      summary: Get position mode
      description: "Query current position mode. Weight: 5."
      operationId: getPositionMode
      security:
        - apiKey: []
      parameters:
        - $ref: '#/components/parameters/Timestamp'
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/BaseResponse'
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          positionMode:
                            type: string
                            description: "Position mode"
                            enum: [BUYSELL, OPENCLOSE]
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
    post:
      tags: [Account]
      summary: Update position mode
      description: "Modify position mode. Weight: 5."
      operationId: updatePositionMode
      security:
        - apiKey: []
      parameters:
        - $ref: '#/components/parameters/Timestamp'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [positionMode]
              properties:
                positionMode:
                  type: string
                  description: "Position mode: BUYSELL (one-way) or OPENCLOSE (hedge)"
                  enum: [BUYSELL, OPENCLOSE]
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BaseResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /uapi/v1/trade/isolatedMode:
    get:
      tags: [Account]
      summary: Get margin mode
      description: "Query isolated/cross margin mode for a specific symbol. Weight: 5."
      operationId: getIsolatedMode
      security:
        - apiKey: []
      parameters:
        - $ref: '#/components/parameters/Timestamp'
        - name: symbol
          in: query
          required: true
          description: Futures symbol
          schema:
            type: string
            example: BTC_USDT_PERP
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/BaseResponse'
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          symbol:
                            type: string
                            description: Futures symbol
                          isolatedMode:
                            type: string
                            description: "Margin mode"
                            enum: [CROSS, ISOLATED]
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
    post:
      tags: [Account]
      summary: Update margin mode
      description: "Switch between isolated and cross margin mode for a specific symbol. Weight: 5."
      operationId: updateIsolatedMode
      security:
        - apiKey: []
      parameters:
        - $ref: '#/components/parameters/Timestamp'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [symbol, isolatedMode]
              properties:
                symbol:
                  type: string
                  description: Futures symbol
                  example: BTC_USDT_PERP
                isolatedMode:
                  type: string
                  description: "Margin mode: CROSS (default) or ISOLATED"
                  enum: [CROSS, ISOLATED]
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BaseResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api/v1/assets/transfer:
    post:
      tags: [Transfer]
      summary: Create transfer
      description: "Transfer funds between main account and trade account. Requires Transfer permission. Weight: 5."
      operationId: createTransfer
      security:
        - apiKey: []
      parameters:
        - $ref: '#/components/parameters/Timestamp'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [fromAccount, toAccount, currency, amount]
              properties:
                fromAccount:
                  type: string
                  description: Source account
                  enum: [MAIN, TRADE]
                toAccount:
                  type: string
                  description: Destination account
                  enum: [MAIN, TRADE]
                currency:
                  type: string
                  description: Currency to transfer
                  example: USDT
                amount:
                  type: string
                  description: Transfer amount
                clientId:
                  type: string
                  description: "Client request ID, must be unique"
                comment:
                  type: string
                  description: "Remark, limited to 32 characters"
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/BaseResponse'
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          transferId:
                            type: string
                            description: Transfer ID
                          status:
                            type: string
                            description: Transfer status
                            enum: [COMPLETED, PROCESSING, FAILED]
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
    get:
      tags: [Transfer]
      summary: Get single transfer record
      description: "Query a single transfer record by client ID. Requires Read permission. Weight: 5."
      operationId: getTransfer
      security:
        - apiKey: []
      parameters:
        - $ref: '#/components/parameters/Timestamp'
        - name: clientId
          in: query
          description: Client request ID
          schema:
            type: string
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/BaseResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/TransferRecord'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api/v1/assets/transfers:
    get:
      tags: [Transfer]
      summary: Get transfer records
      description: "Query transfer record list sorted by time in descending order. Requires Read permission. Weight: 5."
      operationId: getTransfers
      security:
        - apiKey: []
      parameters:
        - $ref: '#/components/parameters/Timestamp'
        - name: status
          in: query
          description: "Filter by transfer status. Defaults to ALL."
          schema:
            type: string
            enum: [ALL, COMPLETED, FAILED, PROCESSING]
            default: ALL
        - name: endTime
          in: query
          description: End time in milliseconds
          schema:
            type: integer
            format: int64
        - name: limit
          in: query
          description: "Number of results to return. Default 20, range 1-100."
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/BaseResponse'
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          records:
                            type: array
                            description: Transfer records sorted by time in descending order
                            items:
                              $ref: '#/components/schemas/TransferRecord'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /uapi/v1/trade/order:
    post:
      tags: [Trade]
      summary: Place order
      description: "Place a new futures order (async). Weight: 5."
      operationId: placeOrder
      security:
        - apiKey: []
      parameters:
        - $ref: '#/components/parameters/Timestamp'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [symbol, side, type]
              properties:
                clientOrderId:
                  type: string
                  description: "Client order ID for deduplication (server validates within 2 hours). Max 64 characters, alphanumeric and hyphen only."
                symbol:
                  type: string
                  description: Futures symbol
                  example: BTC_USDT_PERP
                positionSide:
                  type: string
                  description: "Position side. Required for hedge mode (LONG/SHORT). Defaults to BOTH for one-way mode."
                  enum: [BOTH, LONG, SHORT]
                side:
                  type: string
                  description: Order side
                  enum: [BUY, SELL]
                type:
                  type: string
                  description: Order type
                  enum: [LIMIT, MARKET_QTY, IOC, FOK, POSTONLY]
                size:
                  type: string
                  description: "Order quantity. Required for limit orders."
                price:
                  type: string
                  description: "Order price. Required for limit orders."
                reduceOnly:
                  type: boolean
                  description: "Reduce-only flag. Only applicable in one-way mode (BUYSELL). Defaults to false. Must be false in hedge mode (OPENCLOSE)."
                  default: false
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/BaseResponse'
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          orderId:
                            type: integer
                            format: int64
                            description: Order ID
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
    get:
      tags: [Trade]
      summary: Get single order
      description: "Query a single order by order ID. Weight: 5."
      operationId: getOrder
      security:
        - apiKey: []
      parameters:
        - $ref: '#/components/parameters/Timestamp'
        - name: symbol
          in: query
          required: true
          description: Futures symbol
          schema:
            type: string
            example: BTC_USDT_PERP
        - name: orderId
          in: query
          required: true
          description: Order ID
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/BaseResponse'
                  - type: object
