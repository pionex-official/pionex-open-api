openapi: 3.0.3
info:
  title: Pionex WebSocket API
  version: 1.0.0
  description: |
    Pionex cryptocurrency exchange WebSocket API for real-time market data and account updates.

    # General Info

    ## Connection Endpoints
    - **Public stream**: `wss://ws.pionex.com/wsPub` (no authentication)
    - **Private stream**: `wss://ws.pionex.com/ws` (requires authentication)

    ## Authentication (Private Stream)

    [API Key Guide](https://www.pionex.com/docs/api-docs/references/api-key-guide)

    Private streams require authentication via query parameters:
    - `key`: Your API Key
    - `timestamp`: Current time in milliseconds
    - `signature`: HMAC SHA256 hash for verification

    ### Signing

    1. Obtain the current millisecond timestamp
    2. Format key-value pairs for `key` and `timestamp`
    3. Sort parameters alphabetically and join with `&`
    4. Append sorted parameters to the path: `/ws?<sorted_params>`
    5. Concatenate the string `websocket_auth` to the path URL
    6. Generate HMAC SHA256 using your API Secret and the complete string, convert to hexadecimal
    7. Add the resulting signature to query parameters

    **Example:**

    Concatenated string for signing:
    ```
    /ws?key=OElNn5D_Frnf5MR0ChjYdG7PunK0AOgHTvevwzWS&timestamp=1655896754515websocket_auth
    ```

    Generated signature:
    ```
    3e901247350e744353f4a7a479fd67181184a627b119352ec1b7a432925e772c
    ```

    Final connection URL:
    ```
    wss://ws.pionex.com/ws?key=OElNn5D_Frnf5MR0ChjYdG7PunK0AOgHTvevwzWS&timestamp=1655896754515&signature=3e901247350e744353f4a7a479fd67181184a627b119352ec1b7a432925e772c
    ```

    ## Subscribe / Unsubscribe
    Send JSON message after connection:
    ```json
    {"op": "SUBSCRIBE", "topic": "<TOPIC>", "symbol": "<SYMBOL>"}
    {"op": "UNSUBSCRIBE", "topic": "<TOPIC>", "symbol": "<SYMBOL>"}
    ```

    ## Heartbeat
    - Server sends `{"op": "PING", "timestamp": <ms>}` every 15 seconds
    - Client must reply `{"op": "PONG", "timestamp": <ms>}`
    - Missing 3 consecutive PONGs triggers disconnection

    ## Limits
    - Maximum 10 concurrent connections per IP

servers:
  - url: wss://ws.pionex.com
    description: Pionex WebSocket Server

tags:
  - name: Public Stream
    description: "Public channels via `wss://ws.pionex.com/wsPub` (no auth required)"
  - name: Private Stream
    description: "Private channels via `wss://ws.pionex.com/ws` (auth required)"

paths:
  "/wsPub (trade)":
    get:
      tags: [Public Stream]
      summary: Trade Stream
      operationId: subscribeTrade
      description: |
        **Topic**: `TRADE`

        Real-time market trade stream. Up to 100 trade records per message, sorted by timestamp descending.

        **Subscribe**:
        ```json
        {"op": "SUBSCRIBE", "topic": "TRADE", "symbol": "BTC_USDT"}
        ```

        **Unsubscribe**:
        ```json
        {"op": "UNSUBSCRIBE", "topic": "TRADE", "symbol": "BTC_USDT"}
        ```
      parameters:
        - name: symbol
          in: query
          required: true
          description: Trading pair symbol
          schema:
            type: string
            example: BTC_USDT
      responses:
        '200':
          description: Trade update message
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TradeMessage'
              example:
                topic: TRADE
                symbol: BTC_USDT
                timestamp: 1566691672311
                data:
                  - symbol: BTC_USDT
                    tradeId: "600848671"
                    price: "7962.62"
                    size: "0.0122"
                    side: BUY
                    timestamp: 1566691672311

  "/wsPub (depth)":
    get:
      tags: [Public Stream]
      summary: Depth Stream
      operationId: subscribeDepth
      description: |
        **Topic**: `DEPTH`

        Real-time order book depth stream.

        **Subscribe**:
        ```json
        {"op": "SUBSCRIBE", "topic": "DEPTH", "symbol": "BTC_USDT", "limit": 5}
        ```

        **Unsubscribe**:
        ```json
        {"op": "UNSUBSCRIBE", "topic": "DEPTH", "symbol": "BTC_USDT"}
        ```
      parameters:
        - name: symbol
          in: query
          required: true
          description: Trading pair symbol
          schema:
            type: string
            example: BTC_USDT
        - name: limit
          in: query
          description: "Depth level limit. Range: 1 - 100. Default: 5"
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 5
      responses:
        '200':
          description: Depth update message
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DepthMessage'
              example:
                topic: DEPTH
                symbol: BTC_USDT
                timestamp: 1566691672311
                data:
                  bids:
                    - ["27964.01", "0.0675"]
                    - ["27963.23", "0.9111"]
                  asks:
                    - ["27979.32", "0.0731"]
                    - ["27980.97", "1.0294"]

  "/ws (order)":
    get:
      tags: [Private Stream]
      summary: Order Stream
      operationId: subscribeOrder
      description: |
        **Topic**: `ORDER`

        Real-time order updates. Updates every 250ms when there are changes, every 5000ms when idle.

        **Subscribe**:
        ```json
        {"op": "SUBSCRIBE", "topic": "ORDER", "symbol": "BTC_USDT"}
        ```

        **Unsubscribe**:
        ```json
        {"op": "UNSUBSCRIBE", "topic": "ORDER", "symbol": "BTC_USDT"}
        ```
      parameters:
        - name: symbol
          in: query
          required: true
          description: Trading pair symbol
          schema:
            type: string
            example: BTC_USDT
      responses:
        '200':
          description: Order update message
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrderMessage'

  "/ws (fill)":
    get:
      tags: [Private Stream]
      summary: Fill Stream
      operationId: subscribeFill
      description: |
        **Topic**: `FILL`

        Real-time fill (trade execution) updates across all markets.

        **Subscribe**:
        ```json
        {"op": "SUBSCRIBE", "topic": "FILL", "symbol": "BTC_USDT"}
        ```

        **Unsubscribe**:
        ```json
        {"op": "UNSUBSCRIBE", "topic": "FILL", "symbol": "BTC_USDT"}
        ```
      parameters:
        - name: symbol
          in: query
          required: true
          description: Trading pair symbol
          schema:
            type: string
            example: BTC_USDT
      responses:
        '200':
          description: Fill update message
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FillMessage'

  "/ws (balance)":
    get:
      tags: [Private Stream]
      summary: Balance Stream
      operationId: subscribeBalance
      description: |
        **Topic**: `BALANCE`

        Real-time account balance updates. No symbol required.

        **Subscribe**:
        ```json
        {"op": "SUBSCRIBE", "topic": "BALANCE"}
        ```

        **Unsubscribe**:
        ```json
        {"op": "UNSUBSCRIBE", "topic": "BALANCE"}
        ```
      responses:
        '200':
          description: Balance update message
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BalanceMessage'
              example:
                topic: BALANCE
                timestamp: 1566691672311
                data:
                  balances:
                    - coin: BTC
                      free: "0.90000000"
                      frozen: "0.00000000"
                    - coin: USDT
                      free: "100.00000000"
                      frozen: "900.00000000"
                  timestamp: 1566691672311

components:
  schemas:
    TradeMessage:
      type: object
      description: Trade stream message
      properties:
        topic:
          type: string
          example: TRADE
        symbol:
          type: string
          description: Trading pair symbol
        timestamp:
          type: integer
          format: int64
          description: Message timestamp in milliseconds
        data:
          type: array
          description: Up to 100 trade records sorted by timestamp descending
          maxItems: 100
          items:
            $ref: '#/components/schemas/TradeRecord'

    TradeRecord:
      type: object
      properties:
        symbol:
          type: string
          description: Trading pair symbol
        tradeId:
          type: string
          description: Unique trade identifier
        price:
          type: string
          description: Execution price
        size:
          type: string
          description: Trade quantity
        side:
          type: string
          enum: [BUY, SELL]
          description: "Liquidity taker's direction"
        timestamp:
          type: integer
          format: int64
          description: Fill time in milliseconds

    DepthMessage:
      type: object
      description: Depth stream message
      properties:
        topic:
          type: string
          example: DEPTH
        symbol:
          type: string
          description: Trading pair symbol
        timestamp:
          type: integer
          format: int64
          description: Message timestamp in milliseconds
        data:
          type: object
          properties:
            bids:
              type: array
              description: "Bid orders [[price, size], ...] sorted by price descending"
              items:
                type: array
                items:
                  type: string
                minItems: 2
                maxItems: 2
            asks:
              type: array
              description: "Ask orders [[price, size], ...] sorted by price ascending"
              items:
                type: array
                items:
                  type: string
                minItems: 2
                maxItems: 2

    OrderMessage:
      type: object
      description: Order stream message
      properties:
        topic:
          type: string
          example: ORDER
        symbol:
          type: string
          description: Trading pair symbol
        timestamp:
          type: integer
          format: int64
          description: Message timestamp in milliseconds
        data:
          $ref: '#/components/schemas/OrderRecord'

    OrderRecord:
      type: object
      properties:
        orderId:
          type: integer
          format: int64
          description: Order ID
        symbol:
          type: string
          description: Trading pair symbol
        type:
          type: string
          enum: [LIMIT, MARKET]
          description: Order type
        side:
          type: string
          enum: [BUY, SELL]
          description: Order direction
        price:
          type: string
          description: Order price
        size:
          type: string
          description: Order quantity
        filledSize:
          type: string
          description: Filled quantity
        filledAmount:
          type: string
          description: Filled amount
        fee:
          type: string
          description: Transaction fee
        feeCoin:
          type: string
          description: Fee currency
        IOC:
          type: boolean
          description: Immediate-or-cancel flag
        status:
          type: string
          enum: [OPEN, CLOSED]
          description: Order status
        clientOrderId:
          type: string
          description: Client order ID
        createTime:
          type: integer
          format: int64
          description: Create timestamp in milliseconds
        updateTime:
          type: integer
          format: int64
          description: Update timestamp in milliseconds

    FillMessage:
      type: object
      description: Fill stream message
      properties:
        topic:
          type: string
          example: FILL
        symbol:
          type: string
          description: Trading pair symbol
        timestamp:
          type: integer
          format: int64
          description: Message timestamp in milliseconds
        data:
          $ref: '#/components/schemas/FillRecord'

    FillRecord:
      type: object
      properties:
        id:
          type: integer
          format: int64
          description: Fill record ID
        orderId:
          type: integer
          format: int64
          description: Associated order ID
        side:
          type: string
          enum: [BUY, SELL]
          description: Trade direction
        role:
          type: string
          enum: [TAKER, MAKER]
          description: Participant role
        price:
          type: string
          description: Execution price
        size:
          type: string
          description: Fill quantity
        fee:
          type: string
          description: Transaction fee
        feeCoin:
          type: string
          description: Fee currency
        timestamp:
          type: integer
          format: int64
          description: Fill timestamp in milliseconds

    BalanceMessage:
      type: object
      description: Balance stream message
      properties:
        topic:
          type: string
          example: BALANCE
        timestamp:
          type: integer
          format: int64
          description: Message timestamp in milliseconds
        data:
          type: object
          properties:
            balances:
              type: array
              items:
                $ref: '#/components/schemas/BalanceRecord'
            timestamp:
              type: integer
              format: int64
              description: Data timestamp in milliseconds

    BalanceRecord:
      type: object
      properties:
        coin:
          type: string
          description: Currency code
          example: BTC
        free:
          type: string
          description: Available balance
          example: "0.90000000"
        frozen:
          type: string
          description: Frozen balance
          example: "0.00000000"

    PingMessage:
      type: object
      description: Server heartbeat ping
      properties:
        op:
          type: string
          example: PING
        timestamp:
          type: integer
          format: int64
          description: Server timestamp in milliseconds

    PongMessage:
      type: object
      description: Client heartbeat pong response
      properties:
        op:
          type: string
          example: PONG
        timestamp:
          type: integer
          format: int64
          description: Timestamp from the PING message
