    # =========================================================================
    # Signal schemas
    # =========================================================================

    SignalListenerRequest:
      type: object
      required: [signalType, signalParam, base, quote, time, price, data]
      properties:
        signalType:
          type: string
          description: Signal type identifier (ASCII, max 1000 chars)
          example: my_signal
        signalParam:
          type: string
          description: Signal parameters (ASCII, max 5000 chars)
          example: "{}"
        base:
          type: string
          description: Base currency (e.g. BTC)
          example: BTC
        quote:
          type: string
          description: Quote currency (e.g. USDT)
          example: USDT
        time:
          type: string
          format: date-time
          description: Signal trigger time (RFC3339)
          example: "2024-01-15T10:30:00Z"
        price:
          type: string
          description: Price at signal trigger time (ASCII, max 30 chars)
          example: "45000.5"
        data:
          $ref: '#/components/schemas/SignalListenerData'

    SignalListenerData:
      type: object
      required: [action, position_size, contracts]
      properties:
        action:
          type: string
          description: Trading action
          enum: [buy, sell]
          example: buy
        position_size:
          type: string
          description: Position size as a ratio or absolute value
          example: "1"
        contracts:
          type: string
          description: Number of contracts
          example: "1"
        direction:
          type: string
          description: Optional trading direction hint
          example: long
