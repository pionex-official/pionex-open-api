openapi: 3.0.3
info:
  title: Pionex Bot Open API
  description: |
    Pionex cryptocurrency exchange Bot RESTful API - Bot Order List & Futures Grid Bot & Spot Grid Bot endpoints.

    # General Info

    ## Basic Info

    > **Note:** The Bot API is currently in **Beta**. If you would like to use it, please contact us at [open@pionex.com](mailto:open@pionex.com).

    **Base URL:** `https://api.pionex.com`

    **Request Format:**
    - For private requests, the `timestamp` parameter (in milliseconds) must be included in the query string. The timestamp is valid within a range of +/-20 seconds.
    - Private requests require `PIONEX-KEY` (API Key) and `PIONEX-SIGNATURE` headers.
    - GET requests: additional parameters are passed in the query string.
    - POST/DELETE requests: parameters are passed in the request body as JSON (`application/json`).
    - Zero-valued number parameters are disregarded.

    **Signature Construction:**
    - GET: `METHOD + PATH_URL + QUERY + TIMESTAMP`
    - POST/DELETE: `METHOD + PATH_URL + QUERY + TIMESTAMP + body`

    **Response Format:**

    All responses are JSON objects containing:
    - `result` (boolean): success indicator
    - `timestamp` (number): response timestamp in milliseconds
    - On success: `data` object with business information
    - On failure: `code` (string) and `message` (string) with error details

    Success example:
    ```json
    {"result": true, "data": {"buOrderId": "123456789"}, "timestamp": 1566691672311}
    ```

    Failure example:
    ```json
    {"result": false, "code": "PARAMETER_ERROR", "message": "Invalid parameter", "timestamp": 1566691672311}
    ```

    ## Rate Limits

    - Each endpoint has a weight value that determines how many requests it counts toward the limit.
    - IP-based and account-based limits operate independently.
    - All endpoints share the 10 per second limit based on IP.
    - Private endpoints share the 10 per second limit based on ACCOUNT.
    - Exceeding the weight limit results in HTTP 429 status code.

    ## Authentication

    [API Key Guide](https://www.pionex.com/docs/api-docs/references/api-key-guide)

    Private endpoints require HMAC SHA256 signature authentication.

    **Required headers:**
    - `PIONEX-KEY`: Your API Key
    - `PIONEX-SIGNATURE`: HMAC SHA256 hex signature

    **Required query parameter:**
    - `timestamp`: Current time in milliseconds (valid within +/-20 seconds)

    ### API Key Permissions

    Each API Key can be configured with **Bot reading** and/or **Bot trading** permissions. Make sure your API Key has the appropriate permission enabled before calling the following endpoints.

    **Endpoints requiring `Bot reading` permission:**
    - `GET /api/v1/bot/orders` — Get bot order list
    - `GET /api/v1/bot/orders/futuresGrid/order` — Get futures grid order
    - `GET /api/v1/bot/orders/spotGrid/order` — Get spot grid order
    - `GET /api/v1/bot/orders/spotGrid/aiStrategy` — Get spot grid AI strategy

    **Endpoints requiring `Bot trading` permission:**
    - `POST /api/v1/bot/orders/futuresGrid/create` — Create futures grid order
    - `POST /api/v1/bot/orders/futuresGrid/adjustParams` — Adjust futures grid (add investment / modify range)
    - `POST /api/v1/bot/orders/futuresGrid/reduce` — Reduce futures grid position
    - `POST /api/v1/bot/orders/futuresGrid/cancel` — Cancel futures grid order
    - `POST /api/v1/bot/orders/spotGrid/create` — Create spot grid order
    - `POST /api/v1/bot/orders/spotGrid/adjustParams` — Adjust spot grid parameters
    - `POST /api/v1/bot/orders/spotGrid/investIn` — Add investment to spot grid
    - `POST /api/v1/bot/orders/spotGrid/cancel` — Cancel spot grid order
    - `POST /api/v1/bot/orders/spotGrid/profit` — Extract profit from spot grid
  version: 1.0.0
  contact:
    name: Pionex API Support
    url: https://t.me/pionexapi

servers:
  - url: https://api.pionex.com
    description: Production

security: []

tags:
  - name: Bot Orders
    description: Bot order list query (private)
  - name: Futures Grid
    description: Futures Grid Bot management (private)
  - name: Spot Grid
    description: Spot Grid Bot management (private)

paths:
  /api/v1/bot/orders:
    get:
      tags: [Bot Orders]
      summary: Get bot order list
      description: "Query bot order list with optional filters by order type, status, and trading pair. Supports pagination. Weight: 1."
      operationId: getBotOrders
      security:
        - apiKey: []
      parameters:
        - $ref: '#/components/parameters/Timestamp'
        - name: status
          in: query
          description: |
            Order status filter:
            `running` - Running orders (default),
            `finished` - Closed/cancelled orders
          schema:
            type: string
            default: running
        - name: base
          in: query
          description: Base currency filter (e.g. BTC)
          schema:
            type: string
        - name: quote
          in: query
          description: Quote currency filter (e.g. USDT)
          schema:
            type: string
        - name: pageToken
          in: query
          description: Pagination token (from `nextPageToken` or `previousPageToken` in response)
          schema:
            type: string
        - name: buOrderTypes
          in: query
          description: |
            Order type filter. Can pass multiple values. If omitted, returns all types.
            Supported values: `futures_grid`, `spot_grid`, `smart_copy`.
          schema:
            type: array
            items:
              type: string
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/BaseResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/BotOrderListResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api/v1/bot/orders/futuresGrid/order:
    get:
      tags: [Futures Grid]
      summary: Get futures grid order
      description: "Query a futures grid bot order by ID. Weight: 1."
      operationId: getFuturesGridOrder
      security:
        - apiKey: []
      parameters:
        - $ref: '#/components/parameters/Timestamp'
        - name: buOrderId
          in: query
          required: true
          description: Bot order ID
          schema:
            type: string
        - name: lang
          in: query
          description: Language
          schema:
            type: string
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/BaseResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/FuturesGridOrder'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api/v1/bot/orders/futuresGrid/create:
    post:
      tags: [Futures Grid]
      summary: Create futures grid order
      description: "Create a new futures grid bot order. Weight: 1."
      operationId: createFuturesGridOrder
      security:
        - apiKey: []
      parameters:
        - $ref: '#/components/parameters/Timestamp'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateFuturesGridRequest'
      responses:
        '200':
          description: Order created successfully
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/BaseResponse'
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          buOrderData:
                            type: object
                            description: Bot order data
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api/v1/bot/orders/futuresGrid/adjustParams:
    post:
      tags: [Futures Grid]
      summary: Adjust futures grid (add investment / modify range)
      description: "Add investment, modify grid range, or set trigger investment for a futures grid order. Weight: 1."
      operationId: adjustFuturesGridParams
      security:
        - apiKey: []
      parameters:
        - $ref: '#/components/parameters/Timestamp'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AdjustFuturesGridRequest'
      responses:
        '200':
          description: Adjustment applied successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BaseResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api/v1/bot/orders/futuresGrid/reduce:
    post:
      tags: [Futures Grid]
      summary: Reduce futures grid position
      description: "Reduce position size of a futures grid order. Weight: 1."
      operationId: reduceFuturesGrid
      security:
        - apiKey: []
      parameters:
        - $ref: '#/components/parameters/Timestamp'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ReduceFuturesGridRequest'
      responses:
        '200':
          description: Reduction result
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/BaseResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/ReduceFuturesGridResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api/v1/bot/orders/futuresGrid/cancel:
    post:
      tags: [Futures Grid]
      summary: Cancel futures grid order
      description: "Close and cancel a futures grid bot order. Weight: 1."
      operationId: cancelFuturesGridOrder
      security:
        - apiKey: []
      parameters:
        - $ref: '#/components/parameters/Timestamp'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CancelFuturesGridRequest'
      responses:
        '200':
          description: Order cancelled successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BaseResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

  # -------------------------------------------------------------------------
  # Spot Grid
  # -------------------------------------------------------------------------

  /api/v1/bot/orders/spotGrid/order:
    get:
      tags: [Spot Grid]
      summary: Get spot grid order
      description: "Query a spot grid bot order by ID. Weight: 1."
      operationId: getSpotGridOrder
      security:
        - apiKey: []
      parameters:
        - $ref: '#/components/parameters/Timestamp'
        - name: buOrderId
          in: query
          required: true
          description: Bot order ID
          schema:
            type: string
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/BaseResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/SpotGridOrder'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api/v1/bot/orders/spotGrid/aiStrategy:
    get:
      tags: [Spot Grid]
      summary: Get spot grid AI strategy
      description: "Query AI-recommended grid strategy parameters for a trading pair. Weight: 1."
      operationId: getSpotGridAiStrategy
      security:
        - apiKey: []
      parameters:
        - $ref: '#/components/parameters/Timestamp'
        - name: base
          in: query
          required: true
          description: Base currency (e.g. BTC)
          schema:
            type: string
        - name: quote
          in: query
          required: true
          description: Quote currency (e.g. USDT)
          schema:
            type: string
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/BaseResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/SpotGridAiStrategy'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api/v1/bot/orders/spotGrid/create:
    post:
      tags: [Spot Grid]
      summary: Create spot grid order
      description: "Create a new spot grid bot order. Weight: 1."
      operationId: createSpotGridOrder
      security:
        - apiKey: []
      parameters:
        - $ref: '#/components/parameters/Timestamp'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateSpotGridRequest'
      responses:
        '200':
          description: Order created successfully
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/BaseResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/SpotGridOrder'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api/v1/bot/orders/spotGrid/adjustParams:
    post:
      tags: [Spot Grid]
      summary: Adjust spot grid parameters
      description: "Modify grid range (top/bottom/row) or adjust investment for a running spot grid order. Weight: 1."
      operationId: adjustSpotGridParams
      security:
        - apiKey: []
      parameters:
        - $ref: '#/components/parameters/Timestamp'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AdjustSpotGridParamsRequest'
      responses:
        '200':
          description: Adjustment applied successfully
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/BaseResponse'
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          action_id:
                            type: string
                            description: Adjustment action ID
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api/v1/bot/orders/spotGrid/investIn:
    post:
      tags: [Spot Grid]
      summary: Add investment to spot grid
      description: "Add additional investment to a running spot grid order. Weight: 1."
      operationId: investInSpotGrid
      security:
        - apiKey: []
      parameters:
        - $ref: '#/components/parameters/Timestamp'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/InvestInSpotGridRequest'
      responses:
        '200':
          description: Investment added successfully
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/BaseResponse'
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          action_id:
                            type: string
                            description: Investment action ID
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api/v1/bot/orders/spotGrid/cancel:
    post:
      tags: [Spot Grid]
      summary: Cancel spot grid order
      description: "Close and cancel a spot grid bot order. Weight: 1."
      operationId: cancelSpotGridOrder
      security:
        - apiKey: []
      parameters:
        - $ref: '#/components/parameters/Timestamp'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CancelSpotGridRequest'
      responses:
        '200':
          description: Order cancelled successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BaseResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api/v1/bot/orders/spotGrid/profit:
    post:
      tags: [Spot Grid]
      summary: Extract profit from spot grid
      description: "Extract accumulated grid profit from a running spot grid order. Weight: 1."
      operationId: profitSpotGrid
      security:
        - apiKey: []
      parameters:
        - $ref: '#/components/parameters/Timestamp'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProfitSpotGridRequest'
      responses:
        '200':
          description: Profit extracted successfully
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/BaseResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/TransferRecord'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

components:
  securitySchemes:
    apiKey:
      type: apiKey
      in: header
      name: PIONEX-KEY
      description: |
        API Key authentication. Requires two headers:
        - `PIONEX-KEY`: Your API Key
        - `PIONEX-SIGNATURE`: HMAC SHA256 hex signature

        And a `timestamp` query parameter (milliseconds).

  parameters:
    Timestamp:
      name: timestamp
      in: query
      required: true
      description: Current timestamp in milliseconds (valid range +/- 20 seconds)
      schema:
        type: integer
        format: int64

  responses:
    BadRequest:
      description: Bad request
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Unauthorized:
      description: Authentication failed
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'

  schemas:
    BaseResponse:
      type: object
      properties:
        result:
          type: boolean
          description: Request success indicator
        timestamp:
          type: integer
          format: int64
          description: Response timestamp in milliseconds

    ErrorResponse:
      type: object
      properties:
        result:
          type: boolean
          example: false
        code:
          type: string
          description: Error code
        message:
          type: string
          description: Human-readable error message
        timestamp:
          type: integer
          format: int64

    BotOrderListResponse:
      type: object
      description: Bot order list response with pagination
      properties:
        nextPageToken:
          type: string
          nullable: true
          description: Token to fetch the next page
        previousPageToken:
          type: string
          nullable: true
          description: Token to fetch the previous page
        results:
          type: array
          description: List of bot orders
          items:
            $ref: '#/components/schemas/BotOrder'

    BotOrder:
      type: object
      description: Bot order result
      properties:
        buOrderType:
          type: string
          description: |
            Bot order type. Supported values: `futures_grid`, `spot_grid`, `smart_copy`.
        buOrderId:
          type: string
          description: Bot order ID
        userId:
          type: string
          description: User ID
        keyId:
          type: string
          description: API Key ID
        exchange:
          type: string
          description: Exchange identifier
          example: pionex.v2
        base:
          type: string
          description: Base currency
          example: BTC
        quote:
          type: string
          description: Quote currency
          example: USDT
        status:
          type: string
          description: Order status
        createTime:
          type: integer
          format: int64
          description: Creation timestamp in milliseconds
        closeTime:
          type: integer
          format: int64
          description: Close timestamp in milliseconds
        copyFrom:
          type: string
          description: Copy source order ID
        copyType:
          type: string
          description: Copy type
        strategyId:
          type: string
          description: Strategy ID
        canceling:
          type: integer
          format: int64
          description: Canceling flag
        note:
          type: string
          description: Order note
        closeNote:
          type: string
          description: Close note
        customizeName:
          type: string
          description: Custom name
        botName:
          type: string
          description: Bot name
        groupId:
          type: string
          description: Group ID
        copyBotOrderId:
          type: string
          description: Copy bot order ID
        buOrderData:
          type: object
          description: "Order detail data (dynamic structure depending on buOrderType)"

    FuturesGridOrder:
      type: object
      properties:
        keyId:
          type: string
          description: API Key ID
        userId:
          type: string
          description: User ID
        exchange:
          type: string
          description: Exchange identifier
          example: pionex.v2
        base:
          type: string
          description: Base currency
          example: BTC
        quote:
          type: string
          description: Quote currency
          example: USDT
        status:
          type: string
          description: Order status
        createTime:
          type: number
          description: Creation timestamp in milliseconds
        copyFrom:
          type: string
          description: Copy source order ID
        copyType:
          type: string
          description: Copy type
        groupId:
          type: string
          description: Bound group ID
        copyBotOrderId:
          type: string
          description: Copy bot order ID
        note:
          type: string
          description: Note
        customizeName:
          type: string
          description: Custom name
        buOrderData:
          $ref: '#/components/schemas/FuturesGridOrderData'

    FuturesGridOrderData:
      type: object
      properties:
        status:
          type: string
          description: |
            Bot status:
            `prepare`, `lock_currency`, `condition_lock`, `open_position`, `init_grid`,
            `running`, `destroy_grid`, `close_position`, `unlock_currency`, `canceled`,
            `adjust_params`, `adjust_params_open_position`, `adjust_params_init_grid`,
            `pre_pause`, `pausing`, `paused`, `pre_resume`, `resuming`
          enum:
            - prepare
            - lock_currency
            - condition_lock
            - open_position
            - init_grid
            - running
            - destroy_grid
            - close_position
            - unlock_currency
            - canceled
            - adjust_params
            - adjust_params_open_position
            - adjust_params_init_grid
            - pre_pause
            - pausing
            - paused
            - pre_resume
            - resuming
        reasonBy:
          type: string
          description: |
            Close reason:
            `user_cancel` - User cancelled,
            `force_liquidation` - Liquidated,
            `loss_stop` - Stop loss triggered,
            `profit_stop` - Take profit triggered,
            `not_enough_balance` - Insufficient balance during running,
            `not_enough_balance_when_lock` - Lock funds failed after order,
            `create_failed` - Order creation failed
          enum:
            - user_cancel
            - force_liquidation
            - loss_stop
            - profit_stop
            - not_enough_balance
            - not_enough_balance_when_lock
            - create_failed
        top:
          type: string
          description: Grid upper price
        bottom:
          type: string
          description: Grid lower price
        row:
          type: number
          description: Number of grid levels
        gridType:
          type: string
          description: "Grid spacing type: `arithmetic` (equal difference) or `geometric` (equal ratio)"
          enum: [arithmetic, geometric]
        openPrice:
          type: string
          description: Current price at creation
        trend:
          type: string
          description: "Grid direction: `long`, `short`, or `no_trend` (neutral)"
          enum: [long, short, no_trend]
        type:
          type: string
          description: "Operation type (e.g. `invest_in` for adding investment)"
        leverage:
          type: number
          description: Leverage multiplier
        extraMargin:
          type: string
          description: Extra margin amount
        quoteInvestment:
          type: string
          description: Total investment amount
        perVolume:
          type: string
          description: Volume per grid level
        position:
          type: string
          description: Current position size
        positionOpenPrice:
          type: string
          description: Position open price
        marginBalance:
          type: string
          description: Margin balance (after leverage)
        extraBalance:
          type: string
          description: Extra balance
        liquidationTriggered:
          type: boolean
          description: Whether liquidation was triggered
        liquidationPrice:
          type: string
          description: Liquidation price
        liquidationFee:
          type: string
          description: Liquidation fee
        estimateLiquidationPriceUp:
          type: string
          description: Estimated liquidation price (upward)
        estimateLiquidationPriceDown:
          type: string
          description: Estimated liquidation price (downward)
        lossStopType:
          type: string
          description: |
            Stop loss type:
            `price` - By market price (default),
            `profit_amount` - By P&L amount,
            `profit_ratio` - By P&L ratio,
            `price_limit` - By limit price
          enum: [price, profit_amount, profit_ratio, price_limit]
        lossStop:
          type: string
          description: |
            Stop loss value. Interpretation depends on lossStopType:
            `price` -> stop loss price,
            `profit_amount` -> stop loss amount,
            `profit_ratio` -> stop loss ratio
        profitStopType:
          type: string
          description: |
            Take profit type:
            `price` - By price (default),
            `profit_amount` - By profit amount,
            `profit_ratio` - By profit ratio,
            `price_limit` - By limit price
          enum: [price, profit_amount, profit_ratio, price_limit]
        profitStop:
          type: string
          description: |
            Take profit value. Interpretation depends on profitStopType:
            `price` -> take profit price,
            `profit_amount` -> profit amount,
            `profit_ratio` -> profit ratio
        riskStatus:
          type: string
          description: "Risk status"
          enum: [TRADING, HOLDING, TAKEOVER, LIQUIDATION]
          default: TRADING
        lossStopHigh:
          type: string
          description: Upper stop loss price for neutral grid (above top)
        pausePrice:
          type: string
          description: Price when paused
        profitWithdrawn:
          type: string
          description: Total profit withdrawn
        openQuotePrice:
          type: string
