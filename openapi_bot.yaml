    SpotGridOrderData:
      type: object
      description: Spot grid order detail data (GridV5OrderData)
      properties:
        buOrderId:
          type: string
          description: Bot order ID
        top:
          type: string
          description: Grid upper price
        bottom:
          type: string
          description: Grid lower price
        row:
          type: integer
          format: int64
          description: Number of grid levels
        lossStopType:
          type: string
          description: "Stop loss mode: `price`, `profit_amount`, `profit_ratio`"
          enum: [price, profit_amount, profit_ratio]
        lossStop:
          type: string
          description: |
            Stop loss threshold. Interpretation depends on `lossStopType`:
            - `price`: price value (e.g. `"40000"`)
            - `profit_amount`: loss amount in quote currency (e.g. `"-50"`)
            - `profit_ratio`: loss ratio (e.g. `"-0.1"` = -10%)
        lossStopDelay:
          type: integer
          format: int64
          description: Seconds to wait after stop loss condition is first met before executing. `0` means immediate.
        profitStopType:
          type: string
          description: "Take profit mode: `price`, `profit_amount`, `profit_ratio`"
          enum: [price, profit_amount, profit_ratio]
        profitStop:
          type: string
          description: |
            Take profit threshold. Interpretation depends on `profitStopType`:
            - `price`: price value (e.g. `"55000"`)
            - `profit_amount`: profit amount in quote currency (e.g. `"100"`)
            - `profit_ratio`: profit ratio (e.g. `"0.1"` = 10%)
        profitStopDelay:
          type: integer
          format: int64
          description: Seconds to wait after take profit condition is first met before executing. `0` means immediate.
        condition:
