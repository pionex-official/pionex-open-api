        '401':
          $ref: '#/components/responses/Unauthorized'

  /api/v1/bot/orders/spotGrid/checkParams:
    post:
      tags: [Spot Grid]
      summary: Check spot grid parameters
      description: |
        Validate spot grid bot creation parameters and estimate investment values without creating an order. Weight: 1.

        Pass a positive `quote_total_investment` to receive full estimate fields.
        The current market price is fetched automatically — `open_price` is not required.

        **FailedWithData**: For errors marked "Yes" below, the response includes a `data` field
        even when `result=false`, containing `min_investment`, `max_investment`, and `slippage`
        so the client can display the valid investment range.

        **Validation error messages** (returned in `message` when `result` is `false`):

        | Message | Cause | Includes data |
        |---|---|---|
        | `number invalid: {value}` | `top` or `bottom` is not a valid numeric string | No |
        | `number int too long: {value}` | Integer part of `top` or `bottom` exceeds 15 digits | No |
        | `number decimal too long: {value}` | Decimal part of `top` or `bottom` exceeds 15 digits | No |
        | `invalid quote total investment` | `quote_total_investment` must be >= 0 | No |
        | `bottom must be less than top` | `bottom` must be strictly less than `top` | No |
        | `row must be between 2 and 1000` | `row` must be in the range [2, 1000] | No |
        | `invalid grid_type` | `grid_type` must be `arithmetic` or `geometric` | No |
        | `grid price duplicated: reduce row or widen range` | Grid range too narrow or `row` too large — adjacent grid prices are identical | Yes |
        | `quote_total_investment not match quote precision: max {N} decimal places` | `quote_total_investment` exceeds the allowed decimal precision | Yes |
        | `less than min investment` | `quote_total_investment` is `"0"` or less than `min_investment` | Yes |
      operationId: checkSpotGridParams
      security:
        - apiKey: []
      parameters:
        - $ref: '#/components/parameters/Timestamp'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CheckSpotGridParamsRequest'
      responses:
        '200':
          description: Validation result
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/BaseResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/SpotGridCheckParamsData'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api/v1/bot/orders/spotGrid/adjustParams:
