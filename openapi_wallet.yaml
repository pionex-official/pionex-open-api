openapi: 3.0.3
info:
  title: Pionex Wallet Open API
  description: |
    Pionex cryptocurrency exchange Wallet RESTful API - Account balance query endpoints.

    # General Info

    ## Basic Info

    > **Note:** The Wallet API is currently **Invite Only**. If you would like to use it, please contact your BD representative.

    **Base URL:** `https://api.pionex.com`

    **Request Format:**
    - For private requests, the `timestamp` parameter (in milliseconds) must be included in the query string. The timestamp is valid within a range of +/-20 seconds.
    - Private requests require `PIONEX-KEY` (API Key) and `PIONEX-SIGNATURE` headers.
    - GET requests: additional parameters are passed in the query string.
    - POST/DELETE requests: parameters are passed in the request body as JSON (`application/json`).
    - Zero-valued number parameters are disregarded.

    **Signature Construction:**
    - GET: `METHOD + PATH_URL + QUERY + TIMESTAMP`
    - POST/DELETE: `METHOD + PATH_URL + QUERY + TIMESTAMP + body`

    **Response Format:**

    All responses are JSON objects containing:
    - `result` (boolean): success indicator
    - `timestamp` (number): response timestamp in milliseconds
    - On success: `data` object with business information
    - On failure: `code` (string) and `message` (string) with error details

    Success example:
    ```json
    {"result": true, "data": {"totalInUsdt": "12345.67", "totalInBtc": "0.18426"}, "timestamp": 1566691672311}
    ```

    Failure example:
    ```json
    {"result": false, "code": "PARAMETER_ERROR", "message": "Invalid parameter", "timestamp": 1566691672311}
    ```

    ## Rate Limits

    - Each endpoint has a weight value that determines how many requests it counts toward the limit.
    - IP-based and account-based limits operate independently.
    - All endpoints share the 10 per second limit based on IP.
    - Private endpoints share the 10 per second limit based on ACCOUNT.
    - Exceeding the weight limit results in HTTP 429 status code.

    ## Authentication

    [API Key Guide](https://www.pionex.com/docs/api-docs/references/api-key-guide)

    Private endpoints require HMAC SHA256 signature authentication.

    **Required headers:**
    - `PIONEX-KEY`: Your API Key
    - `PIONEX-SIGNATURE`: HMAC SHA256 hex signature

    **Required query parameter:**
    - `timestamp`: Current time in milliseconds (valid within +/-20 seconds)

    ### API Key Permissions

    Each API Key can be configured with **`Trade reading`** permission. Make sure your API Key has the appropriate permission enabled before calling the following endpoints.

    **Endpoints requiring `Trade reading` permission:**
    - `GET /api/v1/balancesFull` — Get full account balances overview

  version: 1.0.0
  contact:
    name: Pionex API Support
    url: https://t.me/pionexapi

servers:
  - url: https://api.pionex.com
    description: Production

security: []

tags:
  - name: Wallet
    description: Account balance query (private)

paths:
  /api/v1/wallet/balancesFull:
    get:
      tags: [Wallet]
      summary: Get full account balances overview
      description: |
        Query all account balances overview including Spot (Bot Account) and Futures (Trader Account) dimensions,
        with price information for each coin and total USDT/BTC valuations. Weight: 1.
      operationId: getBalancesFull
      security:
        - apiKey: []
      parameters:
        - $ref: '#/components/parameters/Timestamp'
        - name: appLang
          in: query
          required: false
          description: Application language (takes priority over sysLang)
          schema:
            type: string
          example: "en"
        - name: sysLang
          in: query
          required: false
          description: System language (used as fallback when appLang is empty)
          schema:
            type: string
          example: "zh"
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/BaseResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/BalancesFullResponse'
              example:
                result: true
                timestamp: 1714000000000
                data:
                  prices:
                    BTC:
                      priceInUsd: "67000.00"
                      priceInBtc: "1"
                      change24hInUsd: "1200.00"
                      change24hInBtc: "0"
                      fullName: "Bitcoin"
                    ETH:
                      priceInUsd: "3200.00"
                      priceInBtc: "0.04776"
                      change24hInUsd: "50.00"
                      change24hInBtc: "-0.00012"
                      fullName: "Ethereum"
                  totalInUsdt: "12345.67"
                  totalInBtc: "0.18426"
                  botAccount:
                    totalInUsdt: "8000.00"
                    detail:
                      - type: "spot"
                        title: "Spot"
                        totalInUsdt: "5000.00"
                        list: []
                        hasMore: false
                        count: 3
                  traderAccount:
                    totalInUsdt: "4345.67"
                    title: "Futures"
                    detail: []
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

components:
  parameters:
    Timestamp:
      name: timestamp
      in: query
      required: true
      description: Request timestamp in milliseconds. Any timestamp older than 20,000 milliseconds or in the future is invalid.
      schema:
        type: integer
        format: int64
      example: 1566691672311

  schemas:
    BaseResponse:
      type: object
      properties:
        result:
          type: boolean
          description: Success indicator
        timestamp:
          type: integer
          format: int64
          description: Response timestamp in milliseconds
        code:
          type: string
          description: Error code (present only on failure)
        message:
          type: string
          description: Error message (present only on failure)

    BalancesFullResponse:
      type: object
      description: Full account balances overview
      properties:
        prices:
          type: object
          additionalProperties:
            $ref: '#/components/schemas/BalancePrice'
          description: Price information for each coin, keyed by coin symbol (e.g. BTC, ETH)
        totalInUsdt:
          type: string
          description: Total USDT valuation across all accounts
        totalInBtc:
          type: string
          description: Total BTC valuation across all accounts
        botAccount:
          $ref: '#/components/schemas/BotAccountBalanceDetail'
        traderAccount:
          $ref: '#/components/schemas/TraderAccountDetail'

    BalancePrice:
      type: object
      description: Coin price information
      properties:
        priceInUsd:
          type: string
          description: Price in USD
        priceInBtc:
          type: string
          description: Price in BTC
        change24hInUsd:
          type: string
          description: 24h price change in USD
        change24hInBtc:
          type: string
          description: 24h price change in BTC
        fullName:
          type: string
          description: Full name of the coin

    BotAccountBalanceDetail:
      type: object
      description: Bot (Spot) account balance detail
      properties:
        totalInUsdt:
          type: string
          description: Total USDT valuation of Bot account
        detail:
          type: array
          items:
            $ref: '#/components/schemas/BalanceDetail'
          description: Categorized balance detail list

    BalanceDetail:
      type: object
      description: Balance category detail
      properties:
        type:
          type: string
          description: Category type
        title:
          type: string
          description: Category title
        totalInUsdt:
          type: string
          description: USDT valuation for this category
        list:
          type: array
          items:
            type: object
          description: Balance entries (structure depends on type)
        hasMore:
          type: boolean
          description: Whether more data is available
        count:
          type: integer
          description: Total number of entries

    TraderAccountDetail:
      type: object
      description: Trader (Futures) account balance detail
      properties:
        totalInUsdt:
          type: string
          description: Total USDT valuation of Trader account
        title:
          type: string
          description: Account title
        detail:
          type: array
          items:
            $ref: '#/components/schemas/FutureDetail'
          description: Futures account categorized detail

    FutureDetail:
      type: object
      description: Futures account category detail
      properties:
        type:
          type: string
          description: Category type
        title:
          type: string
          description: Category title
        totalInUsdt:
          type: string
          description: USDT valuation for this category
        riskState:
          type: string
          description: Risk control state
        balances:
          type: array
          items:
            type: object
          description: Futures balance list
        positions:
          type: array
          items:
            type: object
          description: Position list
        quoteRisks:
          type: array
          items:
            type: object
          description: Quote risk list

  securitySchemes:
    apiKey:
      type: apiKey
      in: header
      name: PIONEX-KEY
      description: API Key for authentication. Signature must be provided in PIONEX-SIGNATURE header.

  responses:
    BadRequest:
      description: Bad Request - Invalid parameters
      content:
        application/json:
          schema:
            allOf:
              - $ref: '#/components/schemas/BaseResponse'
          example:
            result: false
            code: PARAMETER_ERROR
            message: Invalid parameter
            timestamp: 1566691672311

    Unauthorized:
      description: Unauthorized - Missing or invalid API key or signature
      content:
        application/json:
          schema:
            allOf:
              - $ref: '#/components/schemas/BaseResponse'
          example:
            result: false
            code: UNAUTHORIZED
            message: Invalid API key or signature
            timestamp: 1566691672311
